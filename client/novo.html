<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nova enquete - Pollenta</title>
</head>
<body>
  <div style="display:flex; flex-direction:column">
    <div>
      <label for="poll-titulo">Título:</label>
      <input type="text" id="poll-titulo" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-1">Opção 1:</label>
      <input type="text" id="poll-opcao-1" class="poll-opcao" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-2">Opção 2:</label>
      <input type="text" id="poll-opcao-2" class="poll-opcao" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-3">Opção 3:</label>
      <input type="text" id="poll-opcao-3" class="poll-opcao" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-4">Opção 4:</label>
      <input type="text" id="poll-opcao-4" class="poll-opcao" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-5">Opção 5:</label>
      <input type="text" id="poll-opcao-5" class="poll-opcao" autocomplete="off" />
    </div>
    <div>
      <label for="poll-opcao-6">Opção 6:</label>
      <input type="text" id="poll-opcao-6" class="poll-opcao" autocomplete="off" />
    </div>
  </div>
  <button id="poll-enviar">Criar</button>
</body>
<script type="module" src="/js/novo.js"></script>
</html>
